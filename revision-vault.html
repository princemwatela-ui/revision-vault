<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Revision Vault</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #faf8f4; font-family: Georgia, serif; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f5f2ed; }
  ::-webkit-scrollbar-thumb { background: #d9d2c8; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = “revision_vault_v5”;
function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function save(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
const uid = () => Math.random().toString(36).slice(2, 9);
const PAGE_SIZE = 12;

function parseRevisionNotes(raw) {
const lines = raw.split(”\n”);
const pairs = [];
let currentSection = “”;
function isHeader(t) {
if (!t) return false;
if (/^\d+.\d+(.\d+)?\s+[A-Z]/.test(t)) return true;
if (t.length < 60 && !t.endsWith(”?”) && /^[A-Z]/.test(t) && !/[a-z]{10,}/.test(t)) return true;
return false;
}
function isQuestion(t) {
if (!t || isHeader(t)) return false;
if (t.endsWith(”?”)) return true;
if (/^(what|why|how|explain|define|identify|describe|compare|evaluate|assess|outline|state|give|list|provide|consider|where|when|who)/i.test(t)) return true;
return false;
}
function extractTopSection(t) {
const m = t.match(/^(\d+.\d+)/);
return m ? m[1] : null;
}
let i = 0;
while (i < lines.length) {
const line = lines[i].trim();
if (!line) { i++; continue; }
if (isHeader(line)) {
const top = extractTopSection(line);
if (top) currentSection = top;
i++; continue;
}
if (isQuestion(line)) {
const answerLines = [];
i++;
while (i < lines.length) {
const next = lines[i].trim();
if (!next) { i++; continue; }
if (isHeader(next) || isQuestion(next)) break;
answerLines.push(next);
i++;
}
const answer = answerLines.join(” “).trim();
if (answer) pairs.push({ q: line, a: answer, section: currentSection || “General” });
} else { i++; }
}
return pairs;
}

const T = {
bg: “#faf8f4”, surface: “#ffffff”, surface2: “#f5f2ed”, border: “#e8e2d9”,
border2: “#d9d2c8”, text: “#2c2416”, textMed: “#4a3728”, textSoft: “#a39585”,
accent: “#8b6f47”, accentLight: “#f0e8dc”, green: “#4a7c59”, greenLight: “#e8f5ec”,
red: “#c0392b”, redLight: “#fdecea”, shadow: “0 3px 12px rgba(100,80,50,0.10)”,
shadowMd: “0 6px 24px rgba(100,80,50,0.14)”,
};

function App() {
const [db, setDb] = useState(() => load());
const [view, setView] = useState(“home”);
const [activeFolderId, setActiveFolderId] = useState(null);
const [activeSetId, setActiveSetId] = useState(null);
const [modal, setModal] = useState(null);
const [inputName, setInputName] = useState(””);
const [uploadText, setUploadText] = useState(””);
const [parseError, setParseError] = useState(””);
const [previewPairs, setPreviewPairs] = useState(null);
const [pendingSetName, setPendingSetName] = useState(””);

useEffect(() => { save(db); }, [db]);

const folders = db.folders || {};
const activeFolder = folders[activeFolderId];
const activeSet = activeFolderId && activeSetId ? (folders[activeFolderId]?.sets || {})[activeSetId] : null;

function createFolder(name) {
const id = uid();
setDb(d => ({ …d, folders: { …(d.folders || {}), [id]: { name, sets: {} } } }));
setModal(null); setInputName(””);
}

function handleUploadPreview() {
setParseError(””);
const pairs = parseRevisionNotes(uploadText);
if (!pairs.length) { setParseError(“No questions detected. Make sure questions end with ‘?’ or start with What/Why/How/Explain/Define etc.”); return; }
setPendingSetName(inputName.trim());
setPreviewPairs(pairs);
}

function confirmUpload() {
const questions = {};
previewPairs.forEach((p, i) => {
const qid = uid();
questions[qid] = { q: p.q, a: p.a, section: p.section, right: 0, wrong: 0, reviews: 0, order: i };
});
const id = uid();
setDb(d => {
const f = d.folders[activeFolderId];
return { …d, folders: { …d.folders, [activeFolderId]: { …f, sets: { …(f.sets || {}), [id]: { name: pendingSetName, questions } } } } };
});
setModal(null); setInputName(””); setUploadText(””); setPreviewPairs(null); setParseError(””);
}

function markQuestion(folderId, setId, qid, correct) {
setDb(d => {
const q = d.folders[folderId].sets[setId].questions[qid];
return {
…d, folders: { …d.folders, [folderId]: { …d.folders[folderId], sets: { …d.folders[folderId].sets, [setId]: { …d.folders[folderId].sets[setId], questions: { …d.folders[folderId].sets[setId].questions, [qid]: { …q, right: q.right + (correct ? 1 : 0), wrong: q.wrong + (correct ? 0 : 1), reviews: (q.reviews || 0) + 1 } } } } } }
};
});
}

function deleteFolder(fid) { setDb(d => { const f = { …d.folders }; delete f[fid]; return { …d, folders: f }; }); }
function deleteSet(fid, sid) {
setDb(d => { const sets = { …d.folders[fid].sets }; delete sets[sid]; return { …d, folders: { …d.folders, [fid]: { …d.folders[fid], sets } } }; });
}

function exportData() {
const blob = new Blob([JSON.stringify(db, null, 2)], { type: “application/json” });
const a = document.createElement(“a”); a.href = URL.createObjectURL(blob);
a.download = “revision_vault_backup.json”; a.click();
}

function importData(e) {
const file = e.target.files[0]; if (!file) return;
const reader = new FileReader();
reader.onload = ev => { try { setDb(JSON.parse(ev.target.result)); alert(“Imported successfully!”); } catch { alert(“Invalid file.”); } };
reader.readAsText(file);
}

function getWrongBank() {
const items = [];
Object.entries(folders).forEach(([fid, folder]) => {
Object.entries(folder.sets || {}).forEach(([sid, set]) => {
Object.entries(set.questions || {}).forEach(([qid, q]) => {
if (q.wrong > 0) items.push({ …q, qid, sid, fid, folderName: folder.name, setName: set.name });
});
});
});
return items.sort((a, b) => b.wrong - a.wrong);
}

const navStyle = { display: “flex”, alignItems: “center”, gap: 16, padding: “18px 32px”, borderBottom: “2px solid #e8e2d9”, background: “#ffffff”, boxShadow: “0 3px 12px rgba(100,80,50,0.10)”, position: “sticky”, top: 0, zIndex: 10 };

const Nav = ({ showBack, backLabel, onBack, showWrongBank }) => (
<div style={navStyle}>
{showBack && <button onClick={onBack} style={{ background: “none”, border: “2px solid #d9d2c8”, color: “#4a3728”, cursor: “pointer”, fontSize: 16, padding: “8px 18px”, borderRadius: 10, fontFamily: “inherit”, fontWeight: 600 }}>← {backLabel}</button>}
<span style={{ fontSize: 22, fontWeight: 800, color: “#2c2416”, marginRight: “auto”, letterSpacing: “-0.5px” }}>📚 Revision Vault</span>
{showWrongBank && <button onClick={() => setView(“wrongbank”)} style={{ background: “#fdecea”, border: “2px solid #f5c6cb”, color: “#c0392b”, cursor: “pointer”, fontSize: 15, padding: “8px 18px”, borderRadius: 10, fontFamily: “inherit”, fontWeight: 700 }}>❌ Wrong Bank</button>}
<button onClick={exportData} style={{ background: “#f5f2ed”, color: “#4a3728”, border: “2px solid #e8e2d9”, borderRadius: 10, padding: “8px 16px”, fontSize: 14, cursor: “pointer”, fontFamily: “inherit”, fontWeight: 600 }}>⬇ Export</button>
<label style={{ background: “#f5f2ed”, color: “#4a3728”, border: “2px solid #e8e2d9”, borderRadius: 10, padding: “8px 16px”, fontSize: 14, cursor: “pointer”, fontFamily: “inherit”, fontWeight: 600 }}>
⬆ Import <input type=“file” accept=”.json” style={{ display: “none” }} onChange={importData} />
</label>
</div>
);

if (view === “wrongbank”) {
const items = getWrongBank();
return (
<div style={{ fontFamily: “Georgia, serif”, minHeight: “100vh”, background: T.bg, color: T.text }}>
<Nav showBack backLabel=“Home” onBack={() => setView(“home”)} showWrongBank={false} />
<div style={{ padding: “32px 36px”, maxWidth: 1300, margin: “0 auto” }}>
<div style={{ fontSize: 28, fontWeight: 800, marginBottom: 6 }}>Most Missed Questions</div>
<div style={{ color: T.textSoft, fontSize: 16, marginBottom: 28 }}>Ranked by wrong marks — your weak spots surfaced.</div>
{items.length === 0 && <div style={{ color: T.textSoft, marginTop: 60, textAlign: “center”, fontSize: 18 }}>No wrong answers yet. Keep revising.</div>}
<div style={{ columns: 2, columnGap: 20 }}>
{items.map((item, i) => <WrongItem key={item.qid} item={item} rank={i + 1} />)}
</div>
</div>
</div>
);
}

if (view === “set” && activeSet) return (
<SetView
set={activeSet} folderName={activeFolder.name}
Nav={Nav}
onBack={() => setView(“folder”)}
onMark={(qid, correct) => markQuestion(activeFolderId, activeSetId, qid, correct)}
onWrongBank={() => setView(“wrongbank”)}
/>
);

if (view === “folder” && activeFolder) return (
<div style={{ fontFamily: “Georgia, serif”, minHeight: “100vh”, background: T.bg, color: T.text }}>
<Nav showBack backLabel=“Home” onBack={() => setView(“home”)} showWrongBank />
<div style={{ padding: “32px 36px”, maxWidth: 1300, margin: “0 auto” }}>
<div style={{ fontSize: 28, fontWeight: 800, marginBottom: 6 }}>{activeFolder.name}</div>
<div style={{ color: T.textSoft, fontSize: 15, marginBottom: 28 }}>Click a set to start revising, or upload a new one.</div>
<div style={{ display: “grid”, gridTemplateColumns: “repeat(auto-fill, minmax(220px, 1fr))”, gap: 16 }}>
{Object.entries(activeFolder.sets || {}).map(([sid, s]) => {
const qs = Object.values(s.questions || {});
return (
<div key={sid} onClick={() => { setActiveSetId(sid); setView(“set”); }}
style={{ background: T.surface, border: “2px solid #e8e2d9”, borderRadius: 16, padding: “24px 22px”, cursor: “pointer”, boxShadow: T.shadow, position: “relative” }}>
<button style={{ position: “absolute”, top: 12, right: 14, background: “none”, border: “none”, color: T.textSoft, cursor: “pointer”, fontSize: 20 }} onClick={e => { e.stopPropagation(); deleteSet(activeFolderId, sid); }}>×</button>
<div style={{ fontSize: 32, marginBottom: 10 }}>📄</div>
<div style={{ fontWeight: 800, fontSize: 17, color: T.text }}>{s.name}</div>
<div style={{ color: T.textSoft, fontSize: 14, marginTop: 5 }}>{qs.length} questions</div>
</div>
);
})}
<div onClick={() => { setModal(“newSet”); setInputName(””); setUploadText(””); setParseError(””); setPreviewPairs(null); }}
style={{ background: T.surface, border: “2px dashed #d9d2c8”, borderRadius: 16, padding: “24px 22px”, cursor: “pointer”, color: T.textSoft, fontSize: 16, display: “flex”, alignItems: “center”, justifyContent: “center”, gap: 10 }}>
<span style={{ fontSize: 24 }}>＋</span> Upload Set
</div>
</div>
</div>
{modal === “newSet” && (
<UploadModal onClose={() => setModal(null)} onPreview={handleUploadPreview}
inputName={inputName} setInputName={setInputName}
uploadText={uploadText} setUploadText={setUploadText}
parseError={parseError} previewPairs={previewPairs}
onBack={() => setPreviewPairs(null)} onConfirm={confirmUpload} />
)}
</div>
);

return (
<div style={{ fontFamily: “Georgia, serif”, minHeight: “100vh”, background: T.bg, color: T.text }}>
<Nav showBack={false} showWrongBank />
<div style={{ padding: “32px 36px”, maxWidth: 1300, margin: “0 auto” }}>
<div style={{ fontSize: 28, fontWeight: 800, marginBottom: 6 }}>Your Folders</div>
<div style={{ color: T.textSoft, fontSize: 15, marginBottom: 28 }}>Each folder is a subject. Inside, add as many sets as you like.</div>
<div style={{ display: “grid”, gridTemplateColumns: “repeat(auto-fill, minmax(220px, 1fr))”, gap: 16 }}>
{Object.entries(folders).map(([fid, f]) => (
<div key={fid} onClick={() => { setActiveFolderId(fid); setView(“folder”); }}
style={{ background: T.surface, border: “2px solid #e8e2d9”, borderRadius: 16, padding: “24px 22px”, cursor: “pointer”, boxShadow: T.shadow, position: “relative” }}>
<button style={{ position: “absolute”, top: 12, right: 14, background: “none”, border: “none”, color: T.textSoft, cursor: “pointer”, fontSize: 20 }} onClick={e => { e.stopPropagation(); deleteFolder(fid); }}>×</button>
<div style={{ fontSize: 32, marginBottom: 10 }}>📁</div>
<div style={{ fontWeight: 800, fontSize: 17, color: T.text }}>{f.name}</div>
<div style={{ color: T.textSoft, fontSize: 14, marginTop: 5 }}>{Object.keys(f.sets || {}).length} set(s)</div>
</div>
))}
<div onClick={() => { setModal(“newFolder”); setInputName(””); }}
style={{ background: T.surface, border: “2px dashed #d9d2c8”, borderRadius: 16, padding: “24px 22px”, cursor: “pointer”, color: T.textSoft, fontSize: 16, display: “flex”, alignItems: “center”, justifyContent: “center”, gap: 10 }}>
<span style={{ fontSize: 24 }}>＋</span> New Folder
</div>
</div>
</div>
{modal === “newFolder” && (
<div style={{ position: “fixed”, inset: 0, background: “rgba(60,40,20,0.35)”, display: “flex”, alignItems: “center”, justifyContent: “center”, zIndex: 100 }}>
<div style={{ background: T.surface, border: “2px solid #e8e2d9”, borderRadius: 18, padding: 36, width: 480, maxWidth: “95vw”, boxShadow: T.shadowMd }}>
<div style={{ fontSize: 22, fontWeight: 800, marginBottom: 20 }}>New Folder</div>
<label style={{ fontSize: 15, color: T.textMed, marginBottom: 8, display: “block”, fontWeight: 600 }}>Folder name</label>
<input style={{ width: “100%”, background: T.surface2, border: “2px solid #d9d2c8”, borderRadius: 10, padding: “12px 16px”, color: T.text, fontSize: 16, outline: “none”, boxSizing: “border-box”, fontFamily: “inherit” }}
value={inputName} autoFocus onChange={e => setInputName(e.target.value)} placeholder=“e.g. Business Revision”
onKeyDown={e => { if (e.key === “Enter” && inputName.trim()) createFolder(inputName.trim()); }} />
<div style={{ display: “flex”, gap: 12, marginTop: 20, justifyContent: “flex-end” }}>
<button onClick={() => setModal(null)} style={{ background: “none”, color: T.textMed, border: “2px solid #d9d2c8”, borderRadius: 10, padding: “10px 22px”, fontSize: 15, cursor: “pointer”, fontFamily: “inherit” }}>Cancel</button>
<button onClick={() => { if (inputName.trim()) createFolder(inputName.trim()); }} style={{ background: T.accent, color: “#fff”, border: “none”, borderRadius: 10, padding: “10px 22px”, fontWeight: 800, fontSize: 15, cursor: “pointer”, fontFamily: “inherit” }}>Create</button>
</div>
</div>
</div>
)}
</div>
);
}

function UploadModal({ onClose, onPreview, inputName, setInputName, uploadText, setUploadText, parseError, previewPairs, onBack, onConfirm }) {
return (
<div style={{ position: “fixed”, inset: 0, background: “rgba(60,40,20,0.35)”, display: “flex”, alignItems: “center”, justifyContent: “center”, zIndex: 100 }}>
<div style={{ background: “#ffffff”, border: “2px solid #e8e2d9”, borderRadius: 18, padding: 36, width: 580, maxWidth: “95vw”, boxShadow: “0 6px 24px rgba(100,80,50,0.14)”, maxHeight: “90vh”, overflowY: “auto” }}>
{!previewPairs ? (
<>
<div style={{ fontSize: 22, fontWeight: 800, marginBottom: 6 }}>Upload New Set</div>
<div style={{ fontSize: 14, color: “#a39585”, marginBottom: 20 }}>Paste your revision notes — headers, questions and answers all together.</div>
<label style={{ fontSize: 15, color: “#4a3728”, marginBottom: 8, display: “block”, fontWeight: 600 }}>Set name</label>
<input style={{ width: “100%”, background: “#f5f2ed”, border: “2px solid #d9d2c8”, borderRadius: 10, padding: “12px 16px”, color: “#2c2416”, fontSize: 16, outline: “none”, boxSizing: “border-box”, fontFamily: “inherit”, marginBottom: 16 }}
value={inputName} autoFocus onChange={e => setInputName(e.target.value)} placeholder=“e.g. Theme 4 — Global Business” />
<label style={{ fontSize: 15, color: “#4a3728”, marginBottom: 8, display: “block”, fontWeight: 600 }}>Paste your notes</label>
<textarea style={{ width: “100%”, background: “#f5f2ed”, border: “2px solid #d9d2c8”, borderRadius: 10, padding: “12px 16px”, color: “#2c2416”, fontSize: 14, outline: “none”, boxSizing: “border-box”, minHeight: 220, resize: “vertical”, fontFamily: “monospace” }}
value={uploadText} onChange={e => setUploadText(e.target.value)}
placeholder={“4.1.2 International Trade\n\nDefine specialisation.\nSpecialisation is the process of…”} />
{parseError && <div style={{ color: “#c0392b”, fontSize: 14, marginTop: 10 }}>{parseError}</div>}
<div style={{ display: “flex”, gap: 12, marginTop: 20, justifyContent: “flex-end” }}>
<button onClick={onClose} style={{ background: “none”, color: “#4a3728”, border: “2px solid #d9d2c8”, borderRadius: 10, padding: “10px 22px”, fontSize: 15, cursor: “pointer”, fontFamily: “inherit” }}>Cancel</button>
<button disabled={!inputName.trim() || !uploadText.trim()} onClick={onPreview} style={{ background: “#8b6f47”, color: “#fff”, border: “none”, borderRadius: 10, padding: “10px 22px”, fontWeight: 800, fontSize: 15, cursor: “pointer”, fontFamily: “inherit” }}>Parse & Preview →</button>
</div>
</>
) : (
<>
<div style={{ fontSize: 22, fontWeight: 800, marginBottom: 6 }}>Preview — {previewPairs.length} questions found</div>
<div style={{ fontSize: 14, color: “#a39585”, marginBottom: 18 }}>Check a few look right, then confirm.</div>
<div style={{ maxHeight: 360, overflowY: “auto”, display: “flex”, flexDirection: “column”, gap: 10, marginBottom: 18 }}>
{previewPairs.map((p, i) => (
<div key={i} style={{ background: “#f5f2ed”, border: “2px solid #e8e2d9”, borderRadius: 10, padding: “12px 14px” }}>
<div style={{ fontSize: 12, color: “#a39585”, marginBottom: 4 }}>§ {p.section}</div>
<div style={{ fontSize: 15, fontWeight: 700, color: “#2c2416”, marginBottom: 4 }}>{p.q}</div>
<div style={{ fontSize: 13, color: “#4a3728”, lineHeight: 1.5 }}>{p.a.slice(0, 120)}{p.a.length > 120 ? “…” : “”}</div>
</div>
))}
</div>
<div style={{ display: “flex”, gap: 12, justifyContent: “flex-end” }}>
<button onClick={onBack} style={{ background: “none”, color: “#4a3728”, border: “2px solid #d9d2c8”, borderRadius: 10, padding: “10px 22px”, fontSize: 15, cursor: “pointer”, fontFamily: “inherit” }}>← Back</button>
<button onClick={onConfirm} style={{ background: “#8b6f47”, color: “#fff”, border: “none”, borderRadius: 10, padding: “10px 22px”, fontWeight: 800, fontSize: 15, cursor: “pointer”, fontFamily: “inherit” }}>Confirm & Save ✓</button>
</div>
</>
)}
</div>
</div>
);
}

function SetView({ set, folderName, Nav, onBack, onMark, onWrongBank }) {
const allQuestions = Object.entries(set.questions || {}).sort((a, b) => a[1].order - b[1].order);
const sectionMap = {};
allQuestions.forEach(([qid, q]) => {
const sec = q.section || “General”;
if (!sectionMap[sec]) sectionMap[sec] = [];
sectionMap[sec].push([qid, q]);
});
const sectionKeys = Object.keys(sectionMap);
const [activeSectionIdx, setActiveSectionIdx] = useState(0);
const [pageIdx, setPageIdx] = useState(0);
const [showAll, setShowAll] = useState(false);
const [revealed, setRevealed] = useState({});

const activeSection = sectionKeys[activeSectionIdx] || sectionKeys[0];
const sectionQs = sectionMap[activeSection] || [];
const totalPages = Math.ceil(sectionQs.length / PAGE_SIZE);
const pageQs = sectionQs.slice(pageIdx * PAGE_SIZE, (pageIdx + 1) * PAGE_SIZE);
const half = Math.ceil(pageQs.length / 2);
const leftCol = pageQs.slice(0, half);
const rightCol = pageQs.slice(half);

function switchSection(idx) { setActiveSectionIdx(idx); setPageIdx(0); setShowAll(false); setRevealed({}); }
function switchPage(idx) { setPageIdx(idx); setShowAll(false); setRevealed({}); }
function handleMark(qid, correct) { onMark(qid, correct); setRevealed(r => ({ …r, [qid]: false })); }
const isRevealed = qid => showAll || !!revealed[qid];

const totalReviews = allQuestions.reduce((s, [, q]) => s + (q.reviews || 0), 0);
const totalWrong = allQuestions.reduce((s, [, q]) => s + q.wrong, 0);

return (
<div style={{ fontFamily: “Georgia, serif”, minHeight: “100vh”, background: “#faf8f4”, color: “#2c2416” }}>
<Nav showBack backLabel={folderName} onBack={onBack} showWrongBank />
<div style={{ padding: “28px 32px”, maxWidth: 1300, margin: “0 auto” }}>
<div style={{ display: “flex”, gap: 24, marginBottom: 20, padding: “14px 20px”, background: “#ffffff”, border: “2px solid #e8e2d9”, borderRadius: 14, flexWrap: “wrap”, alignItems: “center” }}>
<span style={{ fontSize: 15, color: “#4a3728”, fontWeight: 600 }}>{allQuestions.length} questions</span>
<span style={{ fontSize: 15, color: “#4a3728” }}>🔁 <b>{totalReviews}</b> reviews</span>
<span style={{ fontSize: 15, color: “#c0392b” }}>❌ <b>{totalWrong}</b> wrong</span>
<div style={{ marginLeft: “auto”, display: “flex”, gap: 10 }}>
<button onClick={() => { setShowAll(false); setRevealed({}); }} style={{ background: “#f5f2ed”, color: “#4a3728”, border: “2px solid #e8e2d9”, borderRadius: 8, padding: “7px 18px”, fontSize: 14, cursor: “pointer”, fontFamily: “inherit”, fontWeight: 600 }}>Hide All</button>
<button onClick={() => setShowAll(true)} style={{ background: “#f5f2ed”, color: “#4a3728”, border: “2px solid #e8e2d9”, borderRadius: 8, padding: “7px 18px”, fontSize: 14, cursor: “pointer”, fontFamily: “inherit”, fontWeight: 600 }}>Show All</button>
</div>
</div>

```
    <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
      {sectionKeys.map((sec, i) => (
        <button key={sec} onClick={() => switchSection(i)}
          style={{ background: i === activeSectionIdx ? "#8b6f47" : "#ffffff", color: i === activeSectionIdx ? "#fff" : "#4a3728", border: `2px solid ${i === activeSectionIdx ? "#8b6f47" : "#e8e2d9"}`, borderRadius: 10, padding: "8px 20px", fontSize: 15, cursor: "pointer", fontFamily: "inherit", fontWeight: i === activeSectionIdx ? 800 : 500 }}>
          {sec}
        </button>
      ))}
    </div>

    <div style={{ fontSize: 14, color: "#a39585", marginBottom: 14, fontStyle: "italic" }}>
      Section {activeSection} · Page {pageIdx + 1} of {totalPages} · showing {pageQs.length} of {sectionQs.length} questions
    </div>

    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, alignItems: "start" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {leftCol.map(([qid, q]) => (
          <QuestionCard key={qid} q={q} revealed={isRevealed(qid)}
            onToggle={() => setRevealed(r => ({ ...r, [qid]: !r[qid] }))}
            onMark={correct => handleMark(qid, correct)} />
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {rightCol.map(([qid, q]) => (
          <QuestionCard key={qid} q={q} revealed={isRevealed(qid)}
            onToggle={() => setRevealed(r => ({ ...r, [qid]: !r[qid] }))}
            onMark={correct => handleMark(qid, correct)} />
        ))}
      </div>
    </div>

    <div style={{ display: "flex", gap: 8, marginTop: 24, alignItems: "center", flexWrap: "wrap" }}>
      <span style={{ fontSize: 14, color: "#a39585", marginRight: 6, fontWeight: 600 }}>Pages:</span>
      {Array.from({ length: totalPages }, (_, i) => (
        <button key={i} onClick={() => switchPage(i)}
          style={{ background: i === pageIdx ? "#8b6f47" : "#ffffff", color: i === pageIdx ? "#fff" : "#4a3728", border: `2px solid ${i === pageIdx ? "#8b6f47" : "#e8e2d9"}`, borderRadius: 8, padding: "7px 16px", minWidth: 40, fontSize: 14, cursor: "pointer", fontFamily: "inherit", fontWeight: i === pageIdx ? 800 : 500 }}>
          {i + 1}
        </button>
      ))}
      {pageIdx < totalPages - 1 && (
        <button onClick={() => switchPage(pageIdx + 1)} style={{ background: "#8b6f47", color: "#fff", border: "none", borderRadius: 10, padding: "9px 22px", fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit", marginLeft: "auto" }}>
          Done with this page →
        </button>
      )}
      {pageIdx === totalPages - 1 && activeSectionIdx < sectionKeys.length - 1 && (
        <button onClick={() => switchSection(activeSectionIdx + 1)} style={{ background: "#4a7c59", color: "#fff", border: "none", borderRadius: 10, padding: "9px 22px", fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit", marginLeft: "auto" }}>
          Done — next section →
        </button>
      )}
    </div>
  </div>
</div>
```

);
}

function QuestionCard({ q, revealed, onToggle, onMark }) {
return (
<div style={{ background: “#ffffff”, border: `2px solid ${revealed ? "#8b6f47" : "#e8e2d9"}`, borderRadius: 14, overflow: “hidden”, boxShadow: “0 3px 12px rgba(100,80,50,0.10)”, transition: “border-color 0.15s” }}>
<div style={{ padding: “18px 20px”, cursor: “pointer”, display: “flex”, justifyContent: “space-between”, alignItems: “flex-start”, gap: 12 }} onClick={onToggle}>
<div style={{ fontSize: 16, lineHeight: 1.65, flex: 1, color: “#2c2416”, fontWeight: 600 }}>{q.q}</div>
<div style={{ display: “flex”, gap: 8, alignItems: “center”, flexShrink: 0 }}>
{(q.reviews || 0) > 0 && (
<span style={{ fontSize: 12, color: “#a39585”, background: “#f5f2ed”, border: “2px solid #e8e2d9”, borderRadius: 20, padding: “2px 10px”, whiteSpace: “nowrap”, fontWeight: 600 }}>
{q.reviews}× ✕{q.wrong}
</span>
)}
<span style={{ color: “#a39585”, fontSize: 13, fontWeight: 700 }}>{revealed ? “▲” : “▼”}</span>
</div>
</div>
{revealed && (
<div style={{ borderTop: “2px solid #e8e2d9”, padding: “16px 20px 18px”, background: “#f0e8dc” }}>
<div style={{ fontSize: 16, color: “#2c2416”, lineHeight: 1.75, marginBottom: 16, fontWeight: 500 }}>{q.a}</div>
<div style={{ display: “flex”, gap: 10, alignItems: “center” }}>
<button onClick={() => onMark(true)} style={{ background: “#e8f5ec”, color: “#4a7c59”, border: “2px solid #c3e6cf”, borderRadius: 8, padding: “8px 18px”, fontSize: 14, cursor: “pointer”, fontWeight: 700, fontFamily: “inherit” }}>✅ Got it</button>
<button onClick={() => onMark(false)} style={{ background: “#fdecea”, color: “#c0392b”, border: “2px solid #f5c6cb”, borderRadius: 8, padding: “8px 18px”, fontSize: 14, cursor: “pointer”, fontWeight: 700, fontFamily: “inherit” }}>❌ Missed it</button>
<span style={{ fontSize: 13, color: “#a39585”, marginLeft: 4 }}>or close to just learn</span>
</div>
</div>
)}
</div>
);
}

function WrongItem({ item, rank }) {
const [open, setOpen] = useState(false);
return (
<div style={{ background: “#ffffff”, border: “2px solid #e8e2d9”, borderRadius: 14, marginBottom: 12, overflow: “hidden”, boxShadow: “0 3px 12px rgba(100,80,50,0.10)”, breakInside: “avoid” }}>
<div style={{ padding: “16px 18px”, cursor: “pointer”, display: “flex”, gap: 14, alignItems: “flex-start” }} onClick={() => setOpen(o => !o)}>
<div style={{ fontSize: 20, fontWeight: 800, color: “#c0392b”, minWidth: 36 }}>#{rank}</div>
<div style={{ flex: 1 }}>
<div style={{ fontSize: 15, color: “#2c2416”, fontWeight: 600 }}>{item.q}</div>
<div style={{ fontSize: 13, color: “#a39585”, marginTop: 4 }}>{item.folderName} → {item.setName}</div>
</div>
<div style={{ textAlign: “right”, flexShrink: 0 }}>
<div style={{ color: “#c0392b”, fontWeight: 800, fontSize: 16 }}>✕{item.wrong}</div>
<div style={{ color: “#a39585”, fontSize: 12, marginTop: 2 }}>{item.reviews || 0} reviews</div>
</div>
</div>
{open && (
<div style={{ borderTop: “2px solid #e8e2d9”, padding: “12px 18px 16px 68px”, background: “#f0e8dc”, fontSize: 15, color: “#2c2416”, lineHeight: 1.7, fontWeight: 500 }}>
{item.a}
</div>
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>
