<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Revision Vault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf8f4;font-family:Georgia,serif;color:#2c2416;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f5f2ed}::-webkit-scrollbar-thumb{background:#d9d2c8;border-radius:3px}
.nav{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:2px solid #e8e2d9;background:#fff;box-shadow:0 2px 8px rgba(100,80,50,.08);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.nav-title{font-size:18px;font-weight:800;color:#2c2416;margin-right:auto}
.nav button{font-family:Georgia,serif;cursor:pointer;border-radius:8px;font-size:13px;padding:7px 14px;font-weight:600;border:2px solid #e8e2d9;background:#f5f2ed;color:#4a3728}
.nav .btn-wrong{background:#fdecea;border-color:#f5c6cb;color:#c0392b}
.page{padding:20px;max-width:1300px;margin:0 auto}
.page-title{font-size:24px;font-weight:800;margin-bottom:4px}
.page-sub{color:#a39585;font-size:13px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.grid-card{background:#fff;border:2px solid #e8e2d9;border-radius:14px;padding:18px 16px;cursor:pointer;box-shadow:0 2px 8px rgba(100,80,50,.08);position:relative;transition:border-color .15s}
.grid-card:hover{border-color:#8b6f47}
.grid-card .emoji{font-size:28px;margin-bottom:8px}
.grid-card .name{font-weight:800;font-size:15px}
.grid-card .sub{color:#a39585;font-size:13px;margin-top:4px}
.stats-bar{display:flex;gap:18px;margin-bottom:16px;padding:12px 16px;background:#fff;border:2px solid #e8e2d9;border-radius:12px;flex-wrap:wrap;align-items:center}
.stats-bar span{font-size:14px;color:#4a3728;font-weight:600}
.stats-bar .ws{color:#c0392b}
.stats-bar .btns{margin-left:auto;display:flex;gap:8px}
.stats-bar button{font-family:Georgia,serif;background:#f5f2ed;color:#4a3728;border:2px solid #e8e2d9;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{font-family:Georgia,serif;background:#fff;color:#4a3728;border:2px solid #e8e2d9;border-radius:8px;padding:6px 16px;font-size:14px;cursor:pointer;font-weight:500;transition:all .15s}
.tab.active{background:#8b6f47;border-color:#8b6f47;color:#fff;font-weight:800}
.page-info{font-size:13px;color:#a39585;margin-bottom:12px;font-style:italic}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
.col{display:flex;flex-direction:column;gap:7px}
.qcard{background:#fff;border:2px solid #e8e2d9;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(100,80,50,.08);transition:border-color .15s}
.qcard.open{border-color:#8b6f47}
.qcard-q{padding:13px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.qcard-q-text{font-size:14px;line-height:1.55;flex:1;color:#2c2416;font-weight:600}
.qcard-meta{display:flex;gap:6px;align-items:center;flex-shrink:0}
.qcard-badge{font-size:11px;color:#a39585;background:#f5f2ed;border:2px solid #e8e2d9;border-radius:20px;padding:1px 8px;white-space:nowrap;font-weight:600}
.qcard-arrow{color:#a39585;font-size:12px;font-weight:700}
.qcard-a{border-top:2px solid #e8e2d9;padding:12px 15px 14px;background:#f0e8dc}
.qcard-a-text{font-size:14px;color:#2c2416;line-height:1.7;margin-bottom:12px;font-weight:500}
.qcard-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-got{font-family:Georgia,serif;background:#e8f5ec;color:#4a7c59;border:2px solid #c3e6cf;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:700}
.btn-missed{font-family:Georgia,serif;background:#fdecea;color:#c0392b;border:2px solid #f5c6cb;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:700}
.btn-hint{font-size:12px;color:#a39585;margin-left:2px}
.page-nav{display:flex;gap:6px;margin-top:20px;align-items:center;flex-wrap:wrap}
.page-nav-label{font-size:13px;color:#a39585;margin-right:4px;font-weight:600}
.page-btn{font-family:Georgia,serif;background:#fff;color:#4a3728;border:2px solid #e8e2d9;border-radius:7px;padding:6px 13px;min-width:36px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.page-btn.active{background:#8b6f47;border-color:#8b6f47;color:#fff;font-weight:800}
.btn-done{font-family:Georgia,serif;background:#8b6f47;color:#fff;border:none;border-radius:9px;padding:8px 18px;font-weight:800;font-size:14px;cursor:pointer;margin-left:auto}
.btn-next-sec{font-family:Georgia,serif;background:#4a7c59;color:#fff;border:none;border-radius:9px;padding:8px 18px;font-weight:800;font-size:14px;cursor:pointer;margin-left:auto}
.wrong-item{background:#fff;border:2px solid #e8e2d9;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(100,80,50,.08);break-inside:avoid}
.wrong-top{padding:13px 15px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.wrong-rank{font-size:18px;font-weight:800;color:#c0392b;min-width:30px}
.wrong-q-text{font-size:14px;color:#2c2416;font-weight:600}
.wrong-q-sub{font-size:12px;color:#a39585;margin-top:3px}
.wrong-counts{text-align:right;flex-shrink:0}
.wrong-count{color:#c0392b;font-weight:800;font-size:15px}
.wrong-reviews{color:#a39585;font-size:11px;margin-top:2px}
.wrong-answer{border-top:2px solid #e8e2d9;padding:10px 15px 13px 57px;background:#f0e8dc;font-size:14px;color:#2c2416;line-height:1.7;font-weight:500}
.wrong-cols{columns:2;column-gap:16px}
@media(max-width:700px){
  .two-col{grid-template-columns:1fr}
  .wrong-cols{columns:1}
  .nav{padding:12px 14px}
  .page{padding:14px}
  .stats-bar .btns{margin-left:0;width:100%}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const SUBJECTS = {
  "Business": {
    "Theme 1 — Marketing & People": {
      "1.1": [
        {q:"What is meant by the marketing mix?",a:"Product, Price, Promotion, Place (the 4Ps). Tools used to achieve marketing objectives and identify, anticipate and meet customer needs profitably."},
        {q:"What is meant by an 'effective marketing mix'?",a:"One that meets customer needs and achieves marketing objectives, is balanced and consistently communicated across channels, and provides competitive advantage over rivals."},
        {q:"Why is it important to have an effective marketing mix?",a:"Consumers are well-informed, rational and have changing tastes. Markets are competitive and constantly evolving. Technology changes require businesses to adapt quickly."},
        {q:"What is a perishable good?",a:"Products/components that decay quickly. Examples: flowers, fresh food, dairy products. Requires efficient distribution and inventory management."},
        {q:"What is the difference between a physical and an electronic market?",a:"Physical: buyers/sellers meet face-to-face (retail outlets, markets). Electronic: transactions occur online or via mail order. Electronic markets offer wider reach but are fiercely price-competitive."},
        {q:"What is the difference between a need and a want?",a:"Need: essential for survival (e.g., water, basic food, shelter). Want: desirable but not essential (e.g., designer bag, premium tech). Wants can be cut back when disposable income falls."},
        {q:"Explain the difference between direct and indirect competition.",a:"Direct: similar products targeting same consumers (Pepsi vs Coca-Cola). Indirect: different products competing for same expenditure (flights vs Eurotunnel). Both affect pricing, promotion and product decisions."},
        {q:"How is market size calculated?",a:"Company sales value ÷ company market share × 100. Measures total sales of all producers by value or volume. Example: if a firm has £2m sales and 10% share, market size = £20m."},
        {q:"Why is it important for a business to know the market size?",a:"Assesses whether market is worth entering, calculates own market share and competitor positioning, and identifies if market is expanding or contracting."},
        {q:"How is market growth calculated?",a:"(Change in market size ÷ Original market size) × 100. Measures increase in sales value or volume over time. Example: market grows from £7m to £8m = 14.3% growth."},
        {q:"How is market share calculated?",a:"(Company sales ÷ Total market sales) × 100. Can be measured by value (revenue) or volume (units). Indicates market leadership and strategic positioning."},
        {q:"What is the difference between a niche and a mass market?",a:"Niche: small, specialist segment with distinctive needs (e.g., Long Tall Sally). Mass: large, undifferentiated market with varied backgrounds (e.g., Coca-Cola). Niche = higher prices, less competition; Mass = economies of scale, high competition."},
        {q:"What are the advantages and disadvantages of selling in a niche market?",a:"Advantages: less competition, price premium possible, easier to focus on customer needs. Disadvantages: limited economies of scale, risk of over-reliance on one product, larger firms may enter."},
        {q:"How may a business adapt their marketing mix for a niche market?",a:"Product: highly differentiated, unique features. Price: premium pricing due to reduced price sensitivity. Promotion: targeted via specialist media. Place: selective/exclusive distribution."},
        {q:"What are the advantages and disadvantages of selling in a mass market?",a:"Advantages: economies of scale, higher sales potential, brand recognition. Disadvantages: intense competition, high marketing spend, harder to respond to taste changes."},
        {q:"How may a business adapt their marketing mix for a mass market?",a:"Product: generic with differentiation via branding/USP. Price: competitive/going-rate pricing. Promotion: heavy advertising via wide-reach media. Place: intensive multi-channel distribution."},
        {q:"What is meant by the term 'dynamic market'?",a:"Markets subject to rapid change requiring business adaptation. Driven by technology, consumer tastes, fashion, competition. Failure to adapt can lead to loss of market share or business failure."},
        {q:"How does being in a dynamic market impact a business?",a:"Greater emphasis on innovation and R&D investment, opportunity for first-mover advantage, and risk of costly mistakes if products launched without sufficient testing."},
        {q:"What are the advantages and disadvantages of online retailing to consumers?",a:"Advantages: easier price comparison, 24/7 access, home delivery, potentially lower prices. Disadvantages: cannot try before buying, delivery costs, website security concerns."},
        {q:"What are the advantages and disadvantages of online retailing to businesses?",a:"Advantages: lower overheads, wider reach, easier data collection, 24/7 trading. Disadvantages: website security costs, harder personal selling, postage costs impact margins."},
        {q:"What are the five reasons why growth may occur in existing markets and new markets?",a:"Economic growth (rising living standards), innovation (new technologies), social changes (demographic shifts), legislation (new laws create markets), and demographic changes (ageing population)."},
        {q:"Explain what may happen if a business does not adapt to changes in markets?",a:"Loss of market share to more agile competitors, products become obsolete leading to declining sales, and potential business failure (e.g., Kodak and digital photography)."},
        {q:"What five things may help a business adapt more quickly to market changes?",a:"Flexibility in working practices, ongoing market research, investment in new product development, continuous improvement in efficiency/quality, and niche development serving profitable specialist segments."},
        {q:"What is the difference between risk and uncertainty?",a:"Risk: probabilities of outcomes are known or estimable (e.g., new competitor entry). Uncertainty: future events are unpredictable with no measurable probabilities (e.g., pandemic). Risk can be planned for; uncertainty is beyond control."}
      ],
      "1.2": [
        {q:"Explain the difference between market and product orientation.",a:"Market orientation: designs products based on customer needs identified through research. Product orientation: focuses on product quality/innovation, assumes customers will buy. Market orientation is increasingly important due to competition and changing consumer preferences."},
        {q:"What are the pros and cons of market orientation?",a:"Pros: responds quickly to market changes, anticipates trends, higher new product success rates. Cons: reactive rather than innovative, cannot guarantee market share, requires ongoing research investment."},
        {q:"What are the pros and cons of product orientation?",a:"Pros: focuses on firm strengths, high-quality products, longer-term capital planning. Cons: may miss market opportunities, risk of product obsolescence, difficult if product isn't unique."},
        {q:"Why is market orientation becoming increasingly more important?",a:"Greater competition and shorter product life-cycles, consumers more demanding and informed, markets more fragmented and open to new entrants."},
        {q:"Explain the difference between primary and secondary research.",a:"Primary: first-hand data collected for specific purpose (questionnaires, focus groups, interviews). Secondary: existing data from external sources (government statistics, trade publications). Primary is tailored but expensive; secondary is cheaper but may lack relevance."},
        {q:"What are the advantages and disadvantages of conducting market research?",a:"Advantages: reduces new product risk, aids forecasting, identifies opportunities/threats. Disadvantages: can be inaccurate, may stifle initiative, results may not be what business wants to hear."},
        {q:"What is a product trial?",a:"Selling products in a confined area or providing free samples to gauge demand. Allows modification based on feedback before full-scale launch. Helps estimate costs, sales, revenue and set realistic targets."},
        {q:"How can ICT support market research?",a:"Company websites: automated questionnaires, review systems, competitor analysis. Social networking: broad reach, targeted messaging, real-time trend monitoring. Databases: store large amounts of customer data for segmentation and targeting."},
        {q:"Explain the difference between quantitative and qualitative research.",a:"Quantitative: numerical data from large samples using pre-set questions (surveys, audits). Qualitative: in-depth exploration of motivations using open discussion (focus groups, interviews). Quantitative is generalisable; qualitative reveals deeper insights."},
        {q:"What are the benefits and drawbacks of quantitative research?",a:"Benefits: quick data collection, large samples, findings can be generalised. Drawbacks: lacks depth on motivations, hard to verify data validity, respondents often anonymous. Best for measuring 'what' and 'how much'."},
        {q:"What are the benefits and drawbacks of qualitative research?",a:"Benefits: reveals real motivations, discovers unexpected insights, group discussion generates ideas. Drawbacks: expensive/time-consuming, small samples limit representativeness, data cannot be quantified. Best for exploring 'why'."},
        {q:"Describe what segmentation is.",a:"Division of a market into groups with similar characteristics or needs. Methods: age, gender, income, location, lifestyle, benefits sought, usage rate. Example: toothpaste segmented by benefit (whitening, sensitivity, fresh breath)."},
        {q:"What are the benefits and drawbacks of segmentation?",a:"Benefits: precise customer profiling, targeted communications, growth opportunities, better resource use. Drawbacks: costs of identifying/targeting multiple segments, logistical complexity, higher inventory requirements."},
        {q:"What is market positioning?",a:"Ability to influence consumer perception of a brand relative to competitors. Establishes image/identity so consumers perceive product in a certain way. Achieved through emphasising benefits, USPs, product attributes or origins."},
        {q:"Explain market mapping.",a:"Process of plotting products against competitors using two key variables (e.g., price vs quality). Identifies where a brand fits and reveals unfilled gaps/niches. Helps determine if repositioning is needed through relaunch, new design or advertising."},
        {q:"What does competitive advantage mean?",a:"Attributes allowing a business to outperform rivals and generate greater value. Achieved through lower prices or superior benefits/service justifying higher prices. Enables greater sales, margins and/or customer retention than competitors."},
        {q:"In what ways can a business achieve a competitive advantage?",a:"Cost structure: lower prices or higher margins through efficiency. Product/service: superior quality, design, reliability. Distribution: faster delivery, wider availability, exclusive channels. Plus: innovation, reputation, flexibility, ethical stance."},
        {q:"Explain Michael Porter's Generic Strategies in relation to competitive advantage.",a:"Cost leadership: become lowest-cost producer. Differentiation: offer unique features justifying premium prices. Focus: apply cost leadership or differentiation to a specific segment. Businesses 'stuck in the middle' without clear strategy are less likely to succeed."},
        {q:"What is product differentiation?",a:"How a business distinguishes its products from competitors through distinctive features or marketing. Creates a USP that makes consumers less price-sensitive. The more differentiated, the less concerned consumers become about price."},
        {q:"Explain 'adding value'.",a:"Difference between selling price and cost price. Making product worth more in consumers' eyes through production process or marketing. Basis of all business activity; enables higher prices and competitive advantage."},
        {q:"What does price elasticity of demand (PED) measure?",a:"Responsiveness of demand to a change in price. Formula: % change in quantity demanded ÷ % change in price. Always include negative sign in answer but ignore when interpreting elasticity."},
        {q:"What do the PED values show?",a:"PED between 0 and -1: price inelastic (demand not very responsive). PED = -1: unit elastic. PED less than -1 (e.g., -2): price elastic (demand highly responsive to price)."},
        {q:"What factors can influence the extent of price sensitivity?",a:"Degree of product differentiation, number of close substitutes, brand loyalty, switching costs, necessity vs luxury, % of income spent on good, time period, habitual consumption."},
        {q:"What does income elasticity of demand (YED) measure?",a:"Responsiveness of demand to a change in consumer income. Formula: % change in quantity demanded ÷ % change in income. Positive = normal/luxury good; Negative = inferior good."},
        {q:"What is the significance of YED to a business?",a:"High YED goods: demand volatile with economic cycle; plan capacity accordingly. Low YED goods: stable demand across economic phases; easier production planning. Helps forecast demand changes and adjust marketing/production strategies."}
      ],
      "1.3": [
        {q:"Explain what the design mix is.",a:"Balance between function (does the job), aesthetics (looks/feels good), and economic manufacture (cost-effective). Products positioned within triangle based on priority of each element."},
        {q:"Define promotion.",a:"Way business makes products known to current and potential customers. Aims to ensure awareness, persuade customers product is better than rivals, remind why to buy. All about communication using various methods in promotional mix."},
        {q:"What are the seven types of promotion available to a business?",a:"Personal selling, direct marketing, advertising, public relations, sponsorship, sales promotions, and digital communications. Each has different characteristics, advantages and suitable applications."},
        {q:"What role does packaging play in the selling of a product?",a:"Protection, distribution, selling (design/labelling conveys image), customer convenience. Critical when product cannot be differentiated by features alone. Helps advertise brand, maintain quality, encourage impulse buying."},
        {q:"What types of promotion build long-term sales?",a:"Branding: creates distinct identity and customer loyalty. Persuasive advertising: builds brand image and emotional connection. Public relations: enhances reputation and goodwill over time."},
        {q:"What types of promotion build short-term sales?",a:"Sales promotions: BOGOF, discounts, coupons, loyalty points. Direct selling: personal contact to close sales quickly. Merchandising: in-store presentation encourages impulse buying."},
        {q:"What factors determine the promotional mix chosen?",a:"Stage in product life cycle, nature of product, competition level, marketing budget, overall marketing strategy, target market characteristics, and legal factors (e.g., tobacco advertising restrictions)."},
        {q:"What is branding?",a:"Process of creating distinct identity for business in minds of target audience. Characteristic/name/sign/symbol allowing consumers to identify and differentiate product. Provides USP and competitive advantage when strong."},
        {q:"What are the benefits of strong branding?",a:"Added value: desirable image makes consumers willing to pay more. Ability to charge premium prices: loyal customers less likely to switch. Reduced price elasticity: consumers less price-sensitive."},
        {q:"How can a business build their brand to be stronger?",a:"Unique selling points, advertising (national TV campaigns), sponsorship (high-profile associations), and social media (strengthen brand through endorsements and engagement)."},
        {q:"What are the changes in branding and promotion which reflect social trends?",a:"Viral marketing: encouraging electronic sharing of brand messages. Social media: direct interaction via Instagram, TikTok, Facebook. Emotional branding: triggering emotional responses to create strong, lasting brand attachment."},
        {q:"Define what a pricing strategy is.",a:"Plan for setting product price medium-to-long term to achieve corporate/marketing objectives. Balances being competitive with being profitable. Considers costs, customer perception, competition, objectives and market conditions."},
        {q:"What factors influence the price a business sets?",a:"Production costs, customer perception of value, competitors' prices, market competition state, business objectives, customer demand, PED, target market, product life cycle stage, economic conditions."},
        {q:"Explain the six different pricing strategies.",a:"Cost plus: full cost + % markup. Price skimming: high launch price reduced over time. Penetration: low launch price increased later. Predatory: undercutting to eliminate rivals. Competitive: matching rivals. Psychological: unusual price points (£9.99)."},
        {q:"Explain what distribution is.",a:"Physical or online route product takes from producer to consumer. Concerns availability (how easily product can be bought) and visibility. Key questions: where/how do customers prefer to buy?"},
        {q:"What is a distribution channel? Provide examples.",a:"Route taken by product from producer to consumer; each party is an intermediary. Examples: producer→consumer (Marmite online); producer→wholesaler→retailer (Heinz→Makro→corner shops); producer→retailer (Warburtons→Sainsbury's)."},
        {q:"What factors influence the choice of distribution channel chosen?",a:"Cost, nature of product (perishable, technical, customised), market characteristics (geographic spread, competition), business factors (size, nature, existing networks). Short channels for industrial/expensive products; long channels for consumer goods."},
        {q:"What is the product life-cycle?",a:"Theoretical concept showing stages products go through: development, introduction, growth, maturity, decline, obsolescence. Each stage has characteristic sales, profit, cash flow and marketing implications."},
        {q:"Explain the characteristics of each stage of the product life-cycle.",a:"Development: R&D costs, no sales, negative cash flow. Introduction: low sales, high costs, heavy promotion. Growth: fast sales growth, profits emerge. Maturity: slowing growth, high profits. Decline: falling sales, declining profits."},
        {q:"Explain what an extension strategy is.",a:"Aims to prolong product life and avoid decline stage. Methods: find new uses, add new products, increase usage rate, reposition, modify product, change price/promotion/distribution. Employed towards end of maturity phase."},
        {q:"Explain what the Boston Matrix is.",a:"Tool analysing product portfolio based on market growth rate and relative market share. Four categories: Stars (high growth/high share), Problem Children (high growth/low share), Cash Cows (low growth/high share), Dogs (low growth/low share)."},
        {q:"Explain all the characteristics associated with each category in the Boston Matrix.",a:"Stars: need investment to maintain leadership, self-financing. Problem Children: need substantial investment, negative cash flow. Cash Cows: harvest for cash, little investment needed. Dogs: generally not worth investing in; consider divestment."},
        {q:"Explain how the marketing strategy in a niche market may differ to that in a mass market.",a:"Niche: product highly differentiated, premium pricing, targeted promotion via specialist media, selective distribution. Mass: generic product with USP, competitive pricing, heavy advertising, intensive multi-channel distribution."},
        {q:"Explain the key differences between a B2B and a B2C company.",a:"B2C: impersonal mass communication, many customers, global location possible, simple buying process. B2B: close customer relationships, few important customers, location near clients often needed, complex multi-person buying process."},
        {q:"What is customer loyalty?",a:"More than repeat purchase; implies emotional connection (love, liking, faith) to brand. Loyal customers valuable: easier to sell to, less price-sensitive, act as brand advocates. Built through consistent positive experiences."}
      ],
      "1.4": [
        {q:"What is the difference between 'treating staff as an asset' and 'treating staff as a cost'?",a:"Asset: employees produce goods, deliver services, satisfy customers — business couldn't operate without them. Cost: wages, training, sick pay represent financial outlays to be minimised. Asset view invests in staff; cost view seeks to reduce expenditure."},
        {q:"What are the advantages of treating staff as an asset?",a:"Motivational benefits: employees feel invested in and valued. Increased productivity, improved quality and customer service. Reduced labour turnover, lowering recruitment and training costs."},
        {q:"What does 'flexible working' mean?",a:"Movements from fixed tasks, normal hours and locations. Includes: zero hours contracts, flexible hours, working from home, part-time, temporary workers, multiskilling, outsourcing. Empowers employees to choose when/where they work."},
        {q:"What are the benefits to a business of offering flexible working practices?",a:"Savings on overheads, helps recruitment and retention, responds flexibly to short-term demand changes, accesses specialist skills without permanent hire, and leverages technology for remote working."},
        {q:"What are the key differences between dismissal and redundancy?",a:"Dismissal: worker fired for failing to meet standards or misconduct; no pay-out; can be appealed if unfair. Redundancy: job no longer exists due to lack of work or restructuring; eligible for pay-out."},
        {q:"Explain the difference between individual and collective bargaining.",a:"Individual: employment matters settled through negotiations between employee and employer directly. Collective: negotiation between employer and employee representatives (e.g., trade unions) on behalf of group. Collective gives workers more power."},
        {q:"Why is effective recruitment in a business important?",a:"Helps recruit people who provide strategic advantage, especially critical in service sector. Service businesses differentiated by staff they employ. Hiring right people with right skills vital to achieve company objectives."},
        {q:"Explain the difference between a job description and a person specification.",a:"Job description: outlines tasks, duties, responsibilities, reporting lines for the position itself. Person specification: details abilities, qualifications, experiences, characteristics needed to perform job successfully."},
        {q:"What is internal recruitment and what are the benefits and drawbacks of it?",a:"Filling vacancy from existing workforce. Benefits: cheaper/quicker, managers know employees' skills, may require less training, good for motivation. Drawbacks: existing workers may lack required skills, may stagnate ideas, creates vacancy elsewhere."},
        {q:"What is external recruitment and what are the benefits and drawbacks of it?",a:"Filling vacancy from outside business. Benefits: wider candidate pool, may bring needed skills, brings new ideas. Drawbacks: expensive/time-consuming, may demotivate existing staff who missed promotion."},
        {q:"Explain the differences between induction, on-the-job and off-the-job training.",a:"Induction: introduction helping new hires learn the ropes; helps settle in but delays work start. On-the-job: training in workplace through doing; output continues but can be disruptive. Off-the-job: training away at specialist centres; full concentration but costly and no output."},
        {q:"What does the organisational structure determine?",a:"Authority and responsibility: who is responsible for whom. Individual job roles and titles, accountability lines, formal communication routes. Relationships between employees, departments and locations."},
        {q:"Explain what 'span of control' is.",a:"Number of employees for whom a manager is directly responsible. Narrow span: closer supervision, more hierarchy layers. Wide span: more subordinate independence, fewer managers but harder to control and support staff."},
        {q:"Explain what a hierarchical (tall) structure is and the pros and cons.",a:"Many layers, long chains of command, narrow spans of control. Pros: promotion opportunities, higher earnings potential, easier supervision. Cons: slower communication/decision-making, clear status divisions, higher labour costs."},
        {q:"Explain what a flat structure is and the pros and cons.",a:"Few layers, short chains of command, wide spans of control. Pros: quicker communication/decision-making, empowered employees, lower labour costs. Cons: manager workload large, less direct control, fewer promotion opportunities."},
        {q:"Explain what a matrix structure is and the pros and cons.",a:"Individuals work across teams/projects as well as within own department. Pros: breaks down department barriers, uses skills in varied contexts, improves motivation. Cons: divided loyalties, unclear accountability, difficult co-ordination."},
        {q:"What is delayering and what are the pros and cons?",a:"Removing layers of management from organisational hierarchy. Pros: lower labour costs, faster decision-making, shorter communication paths, stimulates innovation. Cons: widens spans of control, may overload remaining managers."},
        {q:"What is delegation and what are the pros and cons?",a:"Assignment to others of authority for particular functions, tasks, decisions. Pros: reduces management stress, allows focus on key tasks, empowers subordinates. Cons: depends on subordinate quality, harder in smaller firms."},
        {q:"What is the difference between centralised and decentralised decision-making?",a:"Centralised: decisions kept firmly at top of hierarchy among senior management. Decentralised: decision-making spread to junior managers, business units or trading locations. Centralised ensures consistency; decentralised allows local responsiveness."},
        {q:"What is motivation?",a:"Factors within individuals that arouse, maintain and channel behaviour towards a goal. Will to work from enjoyment of work itself and/or desire to achieve goals. Methods: financial (salary, bonus) and non-financial (responsibility, praise)."},
        {q:"Explain Taylor's theory of motivation.",a:"Workers only interested in money; react as individuals not groups; waste time and are lazy. Treat workers like machines: close supervision, timed tasks, autocratic management, division of labour. Motivate using piece-rate payment based on output quantity."},
        {q:"Explain Mayo's theory of motivation.",a:"Studied impact of working conditions on productivity at Hawthorne plant. Found workplace is social system; satisfaction from freedom/control; communication influences morale. Workers need recognition, security, belonging (Hawthorne Effect)."},
        {q:"Explain Maslow's theory of motivation.",a:"Five levels of human needs: physiological, safety, social, esteem, self-actualisation. Lower needs must be met before higher needs motivate. Hierarchy: basic needs (pay, conditions), safety (security), social (belonging), esteem (recognition), self-actualisation (fulfilling potential)."},
        {q:"Explain Herzberg's theory of motivation.",a:"Two-factor theory: motivators (job content: responsibility, recognition, achievement) and hygiene factors (job context: pay, conditions, policies). Motivators increase satisfaction; hygiene factors decrease dissatisfaction. Recommends job enrichment and empowerment."},
        {q:"Describe the five different financial incentives associated with motivation.",a:"Piecework: paid per item (encourages speed but focuses on quantity not quality). Commission: paid on sales. Bonus: additional payment for achieving target. Profit sharing: proportion of company profits. Performance-related pay: salary linked to performance assessment."}

// ── Storage ───────────────────────────────────────────────────────────────────
const SK = "rv_scores_v1";
let scores = (() => { try { return JSON.parse(localStorage.getItem(SK)) || {}; } catch { return {}; } })();
function saveScores() { try { localStorage.setItem(SK, JSON.stringify(scores)); } catch {} }
function getScore(subject, setName, idx) {
  const k = subject+"||"+setName+"||"+idx;
  return scores[k] || {right:0, wrong:0, reviews:0};
}
function markScore(subject, setName, idx, correct) {
  const k = subject+"||"+setName+"||"+idx;
  if (!scores[k]) scores[k] = {right:0, wrong:0, reviews:0};
  scores[k].right += correct ? 1 : 0;
  scores[k].wrong += correct ? 0 : 1;
  scores[k].reviews += 1;
  saveScores();
}

// ── State ─────────────────────────────────────────────────────────────────────
const PAGE_SIZE = 25;
let S = { view:"home", subject:null, setName:null, secIdx:0, pageIdx:0, revealed:{}, showAll:false };
function ss(p) { Object.assign(S, p); render(); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function navHtml(back, backFn, showWrong) {
  return `<div class="nav">
    ${back ? `<button onclick="${backFn}">← ${esc(back)}</button>` : ""}
    <span class="nav-title">📚 Revision Vault</span>
    ${showWrong ? `<button class="btn-wrong" onclick="ss({view:'wrongbank'})">❌ Wrong Bank</button>` : ""}
  </div>`;
}

// ── Wrong Bank ────────────────────────────────────────────────────────────────
function getWrongItems() {
  const items = [];
  Object.entries(SUBJECTS).forEach(([subj, sets]) => {
    Object.entries(sets).forEach(([setName, sections]) => {
      Object.entries(sections).forEach(([sec, qs]) => {
        qs.forEach((q, idx) => {
          const sc = getScore(subj, setName, sec+"_"+idx);
          if (sc.wrong > 0) items.push({...q, subj, setName, sec, idx, ...sc});
        });
      });
    });
  });
  return items.sort((a,b) => b.wrong - a.wrong);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  let html = "";
  if (S.view === "home") html = renderHome();
  else if (S.view === "subject") html = renderSubject();
  else if (S.view === "set") html = renderSet();
  else if (S.view === "wrongbank") html = renderWrongBank();
  document.getElementById("app").innerHTML = html;
}

function renderHome() {
  const cards = Object.keys(SUBJECTS).map(subj => `
    <div class="grid-card" onclick="ss({view:'subject',subject:'${esc(subj)}'})">
      <div class="emoji">📁</div>
      <div class="name">${esc(subj)}</div>
      <div class="sub">${Object.keys(SUBJECTS[subj]).length} sets</div>
    </div>`).join("");
  return navHtml("","",true) + `<div class="page">
    <div class="page-title">Your Folders</div>
    <div class="page-sub">Choose a subject to start revising.</div>
    <div class="grid">${cards}</div>
  </div>`;
}

function renderSubject() {
  const sets = SUBJECTS[S.subject];
  const cards = Object.entries(sets).map(([setName, secs]) => {
    const total = Object.values(secs).reduce((a,b) => a+b.length, 0);
    const wrong = Object.entries(secs).reduce((acc,[sec,qs]) => acc + qs.reduce((a,_,i) => a + getScore(S.subject,setName,sec+"_"+i).wrong, 0), 0);
    return `<div class="grid-card" onclick="ss({view:'set',setName:'${esc(setName)}',secIdx:0,pageIdx:0,revealed:{},showAll:false})">
      <div class="emoji">📄</div>
      <div class="name">${esc(setName)}</div>
      <div class="sub">${total} questions · ${wrong} wrong</div>
    </div>`;
  }).join("");
  return navHtml("Home","ss({view:'home'})",true) + `<div class="page">
    <div class="page-title">${esc(S.subject)}</div>
    <div class="page-sub">Choose a set to begin.</div>
    <div class="grid">${cards}</div>
  </div>`;
}

function renderSet() {
  const secs = SUBJECTS[S.subject][S.setName];
  const secKeys = Object.keys(secs);
  const si = Math.min(S.secIdx, secKeys.length-1);
  const secKey = secKeys[si];
  const qs = secs[secKey];
  const totalPages = Math.max(1, Math.ceil(qs.length / PAGE_SIZE));
  const pi = Math.min(S.pageIdx, totalPages-1);
  const pageQs = qs.slice(pi*PAGE_SIZE, (pi+1)*PAGE_SIZE);
  const half = Math.ceil(pageQs.length/2);
  const left = pageQs.slice(0,half);
  const right = pageQs.slice(half);

  // Stats
  let totalR=0,totalW=0,totalRev=0;
  secKeys.forEach(sk => secs[sk].forEach((_,i) => {
    const sc = getScore(S.subject, S.setName, sk+"_"+i);
    totalR+=sc.right; totalW+=sc.wrong; totalRev+=sc.reviews;
  }));
  const totalQs = secKeys.reduce((a,sk)=>a+secs[sk].length,0);

  const statsBar = `<div class="stats-bar">
    <span>${totalQs} questions</span>
    <span>🔁 <b>${totalRev}</b> reviews</span>
    <span class="ws">❌ <b>${totalW}</b> wrong</span>
    <div class="btns">
      <button onclick="ss({showAll:false,revealed:{}})">Hide All</button>
      <button onclick="ss({showAll:true})">Show All</button>
    </div>
  </div>`;

  const tabs = `<div class="tabs">${secKeys.map((sk,i) => `<button class="tab${i===si?" active":""}" onclick="ss({secIdx:${i},pageIdx:0,revealed:{},showAll:false})">${esc(sk)}</button>`).join("")}</div>`;
  const info = `<div class="page-info">Section ${esc(secKey)} · Page ${pi+1} of ${totalPages} · showing ${pageQs.length} of ${qs.length} questions</div>`;

  function qCard(q, absIdx) {
    const k = secKey+"_"+absIdx;
    const open = S.showAll || !!S.revealed[k];
    const sc = getScore(S.subject, S.setName, k);
    const badge = sc.reviews > 0 ? `<span class="qcard-badge">${sc.reviews}× ✕${sc.wrong}</span>` : "";
    const ans = open ? `<div class="qcard-a">
      <div class="qcard-a-text">${esc(q.a)}</div>
      <div class="qcard-btns">
        <button class="btn-got" onclick="mark('${k}',true)">✅ Got it</button>
        <button class="btn-missed" onclick="mark('${k}',false)">❌ Missed it</button>
        <span class="btn-hint">or close to just learn</span>
      </div>
    </div>` : "";
    return `<div class="qcard${open?" open":""}">
      <div class="qcard-q" onclick="toggleQ('${k}')">
        <div class="qcard-q-text">${esc(q.q)}</div>
        <div class="qcard-meta">${badge}<span class="qcard-arrow">${open?"▲":"▼"}</span></div>
      </div>${ans}
    </div>`;
  }

  const leftHtml = left.map((q,i) => qCard(q, pi*PAGE_SIZE+i)).join("");
  const rightHtml = right.map((q,i) => qCard(q, pi*PAGE_SIZE+half+i)).join("");
  const twoCol = `<div class="two-col"><div class="col">${leftHtml}</div><div class="col">${rightHtml}</div></div>`;

  const pageBtns = Array.from({length:totalPages},(_,i) => `<button class="page-btn${i===pi?" active":""}" onclick="ss({pageIdx:${i},revealed:{},showAll:false})">${i+1}</button>`).join("");
  const doneBtn = pi<totalPages-1
    ? `<button class="btn-done" onclick="ss({pageIdx:${pi+1},revealed:{},showAll:false})">Done with this page →</button>`
    : si<secKeys.length-1
    ? `<button class="btn-next-sec" onclick="ss({secIdx:${si+1},pageIdx:0,revealed:{},showAll:false})">Done — next section →</button>`
    : "";
  const pageNav = `<div class="page-nav"><span class="page-nav-label">Pages:</span>${pageBtns}${doneBtn}</div>`;

  return navHtml(S.setName.length>22?S.setName.slice(0,22)+"…":S.setName,`ss({view:'subject'})`,true) +
    `<div class="page">${statsBar}${tabs}${info}${twoCol}${pageNav}</div>`;
}

function renderWrongBank() {
  const items = getWrongItems();
  const list = items.length === 0
    ? `<p style="color:#a39585;text-align:center;margin-top:50px;font-size:16px">No wrong answers yet. Keep revising!</p>`
    : `<div class="wrong-cols">${items.map((item,i) => {
        const open = !!S["wo_"+item.subj+"_"+item.setName+"_"+item.sec+"_"+item.idx];
        return `<div class="wrong-item">
          <div class="wrong-top" onclick="toggleWrong('${item.subj}','${item.setName}','${item.sec}','${item.idx}')">
            <div class="wrong-rank">#${i+1}</div>
            <div style="flex:1">
              <div class="wrong-q-text">${esc(item.q)}</div>
              <div class="wrong-q-sub">${esc(item.subj)} → ${esc(item.setName)}</div>
            </div>
            <div class="wrong-counts">
              <div class="wrong-count">✕${item.wrong}</div>
              <div class="wrong-reviews">${item.reviews} reviews</div>
            </div>
          </div>
          ${open ? `<div class="wrong-answer">${esc(item.a)}</div>` : ""}
        </div>`;
      }).join("")}</div>`;
  return navHtml("Home","ss({view:'home'})",false) + `<div class="page">
    <div class="page-title">Most Missed Questions</div>
    <div class="page-sub">Ranked by wrong marks — your weak spots surfaced.</div>
    ${list}
  </div>`;
}

function toggleQ(k) {
  const rev = {...S.revealed}; rev[k] = !rev[k]; ss({revealed:rev});
}
function toggleWrong(subj,setName,sec,idx) {
  const k = "wo_"+subj+"_"+setName+"_"+sec+"_"+idx;
  ss({[k]: !S[k]});
}
function mark(k, correct) {
  const parts = k.split("_"); // secKey_idx → but secKey itself has underscore too
  // k format: "4.1_3" where sec=4.1 idx=3
  const lastUnderscore = k.lastIndexOf("_");
  const sec = k.slice(0, lastUnderscore);
  const idx = parseInt(k.slice(lastUnderscore+1));
  markScore(S.subject, S.setName, k, correct);
  const rev = {...S.revealed}; delete rev[k]; ss({revealed:rev});
}

render();
</script>
</body>
</html>
