<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Revision Vault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf8f4;font-family:Georgia,serif;color:#2c2416;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f5f2ed}::-webkit-scrollbar-thumb{background:#d9d2c8;border-radius:3px}
.nav{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:2px solid #e8e2d9;background:#fff;box-shadow:0 2px 8px rgba(100,80,50,.08);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.nav-title{font-size:18px;font-weight:800;color:#2c2416;margin-right:auto}
.nav button{font-family:Georgia,serif;cursor:pointer;border-radius:8px;font-size:13px;padding:7px 14px;font-weight:600;border:2px solid #e8e2d9;background:#f5f2ed;color:#4a3728}
.nav .btn-wrong{background:#fdecea;border-color:#f5c6cb;color:#c0392b}
.page{padding:20px;max-width:1300px;margin:0 auto}
.page-title{font-size:24px;font-weight:800;margin-bottom:4px}
.page-sub{color:#a39585;font-size:13px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.grid-card{background:#fff;border:2px solid #e8e2d9;border-radius:14px;padding:18px 16px;cursor:pointer;box-shadow:0 2px 8px rgba(100,80,50,.08);position:relative;transition:border-color .15s}
.grid-card:hover{border-color:#8b6f47}
.grid-card .emoji{font-size:28px;margin-bottom:8px}
.grid-card .name{font-weight:800;font-size:15px}
.grid-card .sub{color:#a39585;font-size:13px;margin-top:4px}
.grid-card .del{position:absolute;top:10px;right:12px;background:none;border:none;color:#a39585;cursor:pointer;font-size:18px;padding:2px}
.add-card{background:#fff;border:2px dashed #d9d2c8;border-radius:14px;padding:18px 16px;cursor:pointer;color:#a39585;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color .15s}
.add-card:hover{border-color:#8b6f47;color:#8b6f47}
.stats-bar{display:flex;gap:18px;margin-bottom:16px;padding:12px 16px;background:#fff;border:2px solid #e8e2d9;border-radius:12px;flex-wrap:wrap;align-items:center}
.stats-bar span{font-size:14px;color:#4a3728;font-weight:600}
.stats-bar .ws{color:#c0392b}
.stats-bar .btns{margin-left:auto;display:flex;gap:8px}
.stats-bar button{font-family:Georgia,serif;background:#f5f2ed;color:#4a3728;border:2px solid #e8e2d9;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{font-family:Georgia,serif;background:#fff;color:#4a3728;border:2px solid #e8e2d9;border-radius:8px;padding:6px 16px;font-size:14px;cursor:pointer;font-weight:500;transition:all .15s}
.tab.active{background:#8b6f47;border-color:#8b6f47;color:#fff;font-weight:800}
.page-info{font-size:13px;color:#a39585;margin-bottom:12px;font-style:italic}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
.col{display:flex;flex-direction:column;gap:7px}
.qcard{background:#fff;border:2px solid #e8e2d9;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(100,80,50,.08);transition:border-color .15s}
.qcard.open{border-color:#8b6f47}
.qcard-q{padding:13px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.qcard-q-text{font-size:14px;line-height:1.55;flex:1;color:#2c2416;font-weight:600}
.qcard-meta{display:flex;gap:6px;align-items:center;flex-shrink:0}
.qcard-badge{font-size:11px;color:#a39585;background:#f5f2ed;border:2px solid #e8e2d9;border-radius:20px;padding:1px 8px;white-space:nowrap;font-weight:600}
.qcard-arrow{color:#a39585;font-size:12px;font-weight:700}
.qcard-a{border-top:2px solid #e8e2d9;padding:12px 15px 14px;background:#f0e8dc}
.qcard-a-text{font-size:14px;color:#2c2416;line-height:1.7;margin-bottom:12px;font-weight:500}
.qcard-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-got{font-family:Georgia,serif;background:#e8f5ec;color:#4a7c59;border:2px solid #c3e6cf;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:700}
.btn-missed{font-family:Georgia,serif;background:#fdecea;color:#c0392b;border:2px solid #f5c6cb;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:700}
.btn-hint{font-size:12px;color:#a39585;margin-left:2px}
.page-nav{display:flex;gap:6px;margin-top:20px;align-items:center;flex-wrap:wrap}
.page-nav-label{font-size:13px;color:#a39585;margin-right:4px;font-weight:600}
.page-btn{font-family:Georgia,serif;background:#fff;color:#4a3728;border:2px solid #e8e2d9;border-radius:7px;padding:6px 13px;min-width:36px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.page-btn.active{background:#8b6f47;border-color:#8b6f47;color:#fff;font-weight:800}
.btn-done{font-family:Georgia,serif;background:#8b6f47;color:#fff;border:none;border-radius:9px;padding:8px 18px;font-weight:800;font-size:14px;cursor:pointer;margin-left:auto}
.btn-next-sec{font-family:Georgia,serif;background:#4a7c59;color:#fff;border:none;border-radius:9px;padding:8px 18px;font-weight:800;font-size:14px;cursor:pointer;margin-left:auto}
.wrong-item{background:#fff;border:2px solid #e8e2d9;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(100,80,50,.08);break-inside:avoid}
.wrong-top{padding:13px 15px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.wrong-rank{font-size:18px;font-weight:800;color:#c0392b;min-width:30px}
.wrong-q-text{font-size:14px;color:#2c2416;font-weight:600}
.wrong-q-sub{font-size:12px;color:#a39585;margin-top:3px}
.wrong-counts{text-align:right;flex-shrink:0}
.wrong-count{color:#c0392b;font-weight:800;font-size:15px}
.wrong-reviews{color:#a39585;font-size:11px;margin-top:2px}
.wrong-answer{border-top:2px solid #e8e2d9;padding:10px 15px 13px 57px;background:#f0e8dc;font-size:14px;color:#2c2416;line-height:1.7;font-weight:500}
.wrong-cols{columns:2;column-gap:16px}
.overlay{position:fixed;inset:0;background:rgba(60,40,20,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border:2px solid #e8e2d9;border-radius:16px;padding:28px;width:100%;max-width:560px;box-shadow:0 6px 24px rgba(100,80,50,.14);max-height:90vh;overflow-y:auto}
.modal h2{font-size:20px;font-weight:800;margin-bottom:4px}
.modal p{font-size:13px;color:#a39585;margin-bottom:18px}
.modal label{font-size:14px;color:#4a3728;margin-bottom:6px;display:block;font-weight:600}
.modal input{width:100%;background:#f5f2ed;border:2px solid #d9d2c8;border-radius:9px;padding:11px 14px;color:#2c2416;font-size:15px;outline:none;font-family:Georgia,serif;margin-bottom:14px}
.modal textarea{width:100%;background:#f5f2ed;border:2px solid #d9d2c8;border-radius:9px;padding:11px 14px;color:#2c2416;font-size:13px;outline:none;font-family:monospace;min-height:180px;resize:vertical;margin-bottom:4px}
.modal-row{display:flex;gap:10px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}
.btn-cancel{font-family:Georgia,serif;background:none;color:#4a3728;border:2px solid #d9d2c8;border-radius:9px;padding:9px 20px;font-size:14px;cursor:pointer}
.btn-primary{font-family:Georgia,serif;background:#8b6f47;color:#fff;border:none;border-radius:9px;padding:9px 20px;font-weight:800;font-size:14px;cursor:pointer}
.error{color:#c0392b;font-size:13px;margin-top:8px}
.preview-list{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.preview-item{background:#f5f2ed;border:2px solid #e8e2d9;border-radius:9px;padding:10px 12px}
.preview-sec{font-size:11px;color:#a39585;margin-bottom:3px}
.preview-q{font-size:14px;font-weight:700;color:#2c2416;margin-bottom:3px}
.preview-a{font-size:12px;color:#4a3728;line-height:1.5}
.syncing{font-size:12px;color:#a39585;padding:4px 10px;border-radius:6px;background:#f5f2ed}
.divider{text-align:center;color:#a39585;font-size:13px;margin:8px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:#e8e2d9}
.divider::before{left:0}.divider::after{right:0}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.wrong-cols{columns:1}.nav{padding:12px 14px}.page{padding:14px}.stats-bar .btns{margin-left:0;width:100%}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#a39585">Loading...</div></div>
<script>
const API_KEY="$2a$10$zSnGgLjJslI1tFeqpbE/5etoM2CpojUUrr.l7amQlQq4Zk4ya36Sa";
const BIN_ID="69c08b1aaa77b81da90c73b3";
const BIN_URL="https://api.jsonbin.io/v3/b/"+BIN_ID;
const PAGE_SIZE=25;
let db={folders:{}};
let syncTimer=null;
let syncing=false;

async function loadFromCloud(){
  try{
    const r=await fetch(BIN_URL+"/latest",{headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":"false"}});
    const data=await r.json();
    db=data||{folders:{}};
    if(!db.folders)db.folders={};
  }catch(e){
    const local=localStorage.getItem("rv_backup");
    if(local)try{db=JSON.parse(local);}catch{}
  }
  render();
}

function saveToCloud(){
  localStorage.setItem("rv_backup",JSON.stringify(db));
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    syncing=true;updateSync();
    try{
      await fetch(BIN_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify(db)});
    }catch(e){}
    syncing=false;updateSync();
  },1000);
}

function updateSync(){
  const el=document.getElementById("sync-ind");
  if(el)el.textContent=syncing?"‚è≥ Saving...":"‚úì Saved";
}

function parseNotes(raw){
  const lines=raw.split("\n");
  const pairs=[];
  let section="";
  function isHeader(t){
    if(!t)return false;
    if(/^\d+\.\d+(\.\d+)?[\s\-‚Äì‚Äî]/.test(t))return true;
    if(/^(theme|section|unit|chapter|topic|part)\s+\d/i.test(t))return true;
    if(t.length<70&&!t.endsWith("?")&&!t.endsWith(".")&&/^[A-Z0-9]/.test(t)&&!/[a-z]{15,}/.test(t)&&!/^(what|why|how|explain|define|identify|describe|compare|evaluate|assess|outline|state|give|list|provide|consider|where|when|who|discuss)/i.test(t))return true;
    return false;
  }
  function isQ(t){
    if(!t||isHeader(t))return false;
    if(t.endsWith("?"))return true;
    if(/^(what|why|how|explain|define|identify|describe|compare|evaluate|assess|outline|state|give|list|provide|consider|where|when|who|discuss|analyse|analyze|suggest|calculate|demonstrate)/i.test(t))return true;
    return false;
  }
  function cleanAns(lines){
    return lines.map(l=>l.replace(/^[\s]*[‚óã‚óè‚Ä¢\-‚Äì‚Äî*‚ñ™‚ó¶]\s*/,"").trim()).filter(Boolean).join(" ");
  }
  let i=0;
  while(i<lines.length){
    const line=lines[i].trim();
    if(!line){i++;continue;}
    if(isHeader(line)){const m=line.match(/^(\d+\.\d+)/);if(m)section=m[1];i++;continue;}
    if(isQ(line)){
      const ans=[];i++;
      while(i<lines.length){
        const next=lines[i].trim();
        if(!next){i++;continue;}
        if(isHeader(next)||isQ(next))break;
        ans.push(next);i++;
      }
      const a=cleanAns(ans);
      if(a)pairs.push({q:line,a,section:section||"General"});
    }else{i++;}
  }
  return pairs;
}

function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

let ST={view:"home",folderId:null,setId:null,secIdx:0,pageIdx:0,revealed:{},showAll:false,modal:null,inputName:"",uploadText:"",parseError:"",previewPairs:null};
function ss(p){Object.assign(ST,p);render();}

function navHtml(backLabel,backFn,showWrong){
  return`<div class="nav">
    ${backLabel?`<button onclick="${backFn}">‚Üê ${esc(backLabel)}</button>`:""}
    <span class="nav-title">üìö Revision Vault</span>
    <span class="syncing" id="sync-ind">‚úì Saved</span>
    ${showWrong?`<button class="btn-wrong" onclick="ss({view:'wrongbank'})">‚ùå Wrong Bank</button>`:""}
  </div>`;
}

function getWrongItems(){
  const items=[];
  Object.entries(db.folders||{}).forEach(([fid,folder])=>{
    Object.entries(folder.sets||{}).forEach(([sid,set])=>{
      Object.entries(set.questions||{}).forEach(([qid,q])=>{
        if(q.wrong>0)items.push({...q,qid,sid,fid,folderName:folder.name,setName:set.name});
      });
    });
  });
  return items.sort((a,b)=>b.wrong-a.wrong);
}

function createFolder(name){
  const id=uid();
  db.folders[id]={name,sets:{}};
  saveToCloud();
  ss({modal:null,inputName:""});
}
function deleteFolder(fid){
  if(!confirm("Delete this folder?"))return;
  delete db.folders[fid];saveToCloud();ss({});
}
function deleteSet(fid,sid){
  if(!confirm("Delete this set?"))return;
  delete db.folders[fid].sets[sid];saveToCloud();ss({});
}
function confirmUpload(){
  const questions={};
  ST.previewPairs.forEach((p,i)=>{
    const qid=uid();
    questions[qid]={q:p.q,a:p.a,section:p.section,right:0,wrong:0,reviews:0,order:i};
  });
  const id=uid();
  const folder=db.folders[ST.folderId];
  if(!folder.sets)folder.sets={};
  folder.sets[id]={name:ST.inputName.trim(),questions};
  saveToCloud();
  ss({modal:null,inputName:"",uploadText:"",previewPairs:null,parseError:""});
}
function markQuestion(fid,sid,qid,correct){
  const q=db.folders[fid].sets[sid].questions[qid];
  q.right+=correct?1:0;q.wrong+=correct?0:1;q.reviews=(q.reviews||0)+1;
  saveToCloud();
  const rev={...ST.revealed};delete rev[qid];ss({revealed:rev});
}
function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    ST.uploadText=ev.target.result;
    const ta=document.getElementById("upload-ta");
    if(ta)ta.value=ST.uploadText;
  };
  reader.readAsText(file);
}
function previewUpload(){
  ST.parseError="";
  const raw=ST.uploadText.trim();
  if(!raw){ST.parseError="Please paste or upload your notes first.";render();return;}
  const pairs=parseNotes(raw);
  if(!pairs.length){ST.parseError="No questions detected. Make sure questions end with '?' or start with What/Why/How/Explain/Define etc.";render();return;}
  ss({previewPairs:pairs,parseError:""});
}
function toggleQ(qid){const r={...ST.revealed};r[qid]=!r[qid];ss({revealed:r});}
function toggleWrong(qid){ss({["wo_"+qid]:!ST["wo_"+qid]});}

function render(){
  let html="";
  if(ST.view==="home")html=renderHome();
  else if(ST.view==="folder")html=renderFolder();
  else if(ST.view==="set")html=renderSet();
  else if(ST.view==="wrongbank")html=renderWrongBank();
  html+=renderModal();
  document.getElementById("app").innerHTML=html;
  updateSync();
}

function renderHome(){
  const folders=db.folders||{};
  let cards=Object.entries(folders).map(([fid,f])=>`
    <div class="grid-card" onclick="ss({view:'folder',folderId:'${fid}'})">
      <button class="del" onclick="event.stopPropagation();deleteFolder('${fid}')">√ó</button>
      <div class="emoji">üìÅ</div>
      <div class="name">${esc(f.name)}</div>
      <div class="sub">${Object.keys(f.sets||{}).length} set(s)</div>
    </div>`).join("");
  cards+=`<div class="add-card" onclick="ss({modal:'newFolder',inputName:''})"><span style="font-size:22px">Ôºã</span> New Folder</div>`;
  return navHtml("","",true)+`<div class="page">
    <div class="page-title">Your Folders</div>
    <div class="page-sub">Each folder is a subject. Upload once ‚Äî saved forever.</div>
    <div class="grid">${cards}</div>
  </div>`;
}

function renderFolder(){
  const folder=db.folders[ST.folderId];
  if(!folder){ss({view:"home"});return"";}
  let cards=Object.entries(folder.sets||{}).map(([sid,s])=>{
    const qs=Object.values(s.questions||{});
    const wrong=qs.reduce((a,q)=>a+q.wrong,0);
    return`<div class="grid-card" onclick="ss({view:'set',setId:'${sid}',secIdx:0,pageIdx:0,revealed:{},showAll:false})">
      <button class="del" onclick="event.stopPropagation();deleteSet('${ST.folderId}','${sid}')">√ó</button>
      <div class="emoji">üìÑ</div>
      <div class="name">${esc(s.name)}</div>
      <div class="sub">${qs.length} questions ¬∑ ${wrong} wrong</div>
    </div>`;
  }).join("");
  cards+=`<div class="add-card" onclick="ss({modal:'newSet',inputName:'',uploadText:'',parseError:'',previewPairs:null})"><span style="font-size:22px">Ôºã</span> Upload Set</div>`;
  return navHtml("Home","ss({view:'home'})",true)+`<div class="page">
    <div class="page-title">${esc(folder.name)}</div>
    <div class="page-sub">Click a set to revise, or upload a new one.</div>
    <div class="grid">${cards}</div>
  </div>`;
}

function renderSet(){
  const folder=db.folders[ST.folderId];
  const set=folder&&folder.sets[ST.setId];
  if(!set){ss({view:"folder"});return"";}
  const allQs=Object.entries(set.questions||{}).sort((a,b)=>a[1].order-b[1].order);
  const sMap={};
  allQs.forEach(([qid,q])=>{const s=q.section||"General";if(!sMap[s])sMap[s]=[];sMap[s].push([qid,q]);});
  const sKeys=Object.keys(sMap);
  const si=Math.min(ST.secIdx,sKeys.length-1);
  const secQs=sMap[sKeys[si]]||[];
  const totalPages=Math.max(1,Math.ceil(secQs.length/PAGE_SIZE));
  const pi=Math.min(ST.pageIdx,totalPages-1);
  const pageQs=secQs.slice(pi*PAGE_SIZE,(pi+1)*PAGE_SIZE);
  const half=Math.ceil(pageQs.length/2);
  const left=pageQs.slice(0,half);
  const right=pageQs.slice(half);
  const totalReviews=allQs.reduce((s,[,q])=>s+(q.reviews||0),0);
  const totalWrong=allQs.reduce((s,[,q])=>s+q.wrong,0);
  const statsBar=`<div class="stats-bar">
    <span>${allQs.length} questions</span>
    <span>üîÅ <b>${totalReviews}</b> reviews</span>
    <span class="ws">‚ùå <b>${totalWrong}</b> wrong</span>
    <div class="btns">
      <button onclick="ss({showAll:false,revealed:{}})">Hide All</button>
      <button onclick="ss({showAll:true})">Show All</button>
    </div>
  </div>`;
  const tabs=`<div class="tabs">${sKeys.map((sk,i)=>`<button class="tab${i===si?" active":""}" onclick="ss({secIdx:${i},pageIdx:0,revealed:{},showAll:false})">${esc(sk)}</button>`).join("")}</div>`;
  const info=`<div class="page-info">Section ${esc(sKeys[si])} ¬∑ Page ${pi+1} of ${totalPages} ¬∑ showing ${pageQs.length} of ${secQs.length} questions</div>`;
  function qCard([qid,q]){
    const open=ST.showAll||!!ST.revealed[qid];
    const badge=(q.reviews||0)>0?`<span class="qcard-badge">${q.reviews}√ó ‚úï${q.wrong}</span>`:"";
    const ans=open?`<div class="qcard-a">
      <div class="qcard-a-text">${esc(q.a)}</div>
      <div class="qcard-btns">
        <button class="btn-got" onclick="markQuestion('${ST.folderId}','${ST.setId}','${qid}',true)">‚úÖ Got it</button>
        <button class="btn-missed" onclick="markQuestion('${ST.folderId}','${ST.setId}','${qid}',false)">‚ùå Missed it</button>
        <span class="btn-hint">or close to just learn</span>
      </div>
    </div>`:"";
    return`<div class="qcard${open?" open":""}">
      <div class="qcard-q" onclick="toggleQ('${qid}')">
        <div class="qcard-q-text">${esc(q.q)}</div>
        <div class="qcard-meta">${badge}<span class="qcard-arrow">${open?"‚ñ≤":"‚ñº"}</span></div>
      </div>${ans}
    </div>`;
  }
  const twoCol=`<div class="two-col"><div class="col">${left.map(qCard).join("")}</div><div class="col">${right.map(qCard).join("")}</div></div>`;
  const pageBtns=Array.from({length:totalPages},(_,i)=>`<button class="page-btn${i===pi?" active":""}" onclick="ss({pageIdx:${i},revealed:{},showAll:false})">${i+1}</button>`).join("");
  const doneBtn=pi<totalPages-1
    ?`<button class="btn-done" onclick="ss({pageIdx:${pi+1},revealed:{},showAll:false})">Done with this page ‚Üí</button>`
    :si<sKeys.length-1
    ?`<button class="btn-next-sec" onclick="ss({secIdx:${si+1},pageIdx:0,revealed:{},showAll:false})">Done ‚Äî next section ‚Üí</button>`
    :"";
  const pageNav=`<div class="page-nav"><span class="page-nav-label">Pages:</span>${pageBtns}${doneBtn}</div>`;
  const shortName=set.name.length>22?set.name.slice(0,22)+"‚Ä¶":set.name;
  return navHtml(shortName,`ss({view:'folder'})`,true)+`<div class="page">${statsBar}${tabs}${info}${twoCol}${pageNav}</div>`;
}

function renderWrongBank(){
  const items=getWrongItems();
  const list=items.length===0
    ?`<p style="color:#a39585;text-align:center;margin-top:50px;font-size:16px">No wrong answers yet. Keep revising!</p>`
    :`<div class="wrong-cols">${items.map((item,i)=>{
        const open=!!ST["wo_"+item.qid];
        return`<div class="wrong-item">
          <div class="wrong-top" onclick="toggleWrong('${item.qid}')">
            <div class="wrong-rank">#${i+1}</div>
            <div style="flex:1">
              <div class="wrong-q-text">${esc(item.q)}</div>
              <div class="wrong-q-sub">${esc(item.folderName)} ‚Üí ${esc(item.setName)}</div>
            </div>
            <div class="wrong-counts">
              <div class="wrong-count">‚úï${item.wrong}</div>
              <div class="wrong-reviews">${item.reviews||0} reviews</div>
            </div>
          </div>
          ${open?`<div class="wrong-answer">${esc(item.a)}</div>`:""}
        </div>`;
      }).join("")}</div>`;
  return navHtml("Home","ss({view:'home'})",false)+`<div class="page">
    <div class="page-title">Most Missed Questions</div>
    <div class="page-sub">Ranked by wrong marks ‚Äî your weak spots surfaced.</div>
    ${list}
  </div>`;
}

function renderModal(){
  if(!ST.modal)return"";
  if(ST.modal==="newFolder")return`<div class="overlay" onclick="if(event.target===this)ss({modal:null})">
    <div class="modal">
      <h2>New Folder</h2><p></p>
      <label>Folder name</label>
      <input id="fi" value="${esc(ST.inputName)}" placeholder="e.g. Business" oninput="ST.inputName=this.value" onkeydown="if(event.key==='Enter'&&ST.inputName.trim())createFolder(ST.inputName.trim())">
      <div class="modal-row">
        <button class="btn-cancel" onclick="ss({modal:null})">Cancel</button>
        <button class="btn-primary" onclick="if(ST.inputName.trim())createFolder(ST.inputName.trim())">Create</button>
      </div>
    </div>
  </div>`;
  if(ST.modal==="newSet"&&!ST.previewPairs)return`<div class="overlay" onclick="if(event.target===this)ss({modal:null})">
    <div class="modal">
      <h2>Upload New Set</h2>
      <p>Upload a .txt file or paste your notes below.</p>
      <label>Set name</label>
      <input id="si" value="${esc(ST.inputName)}" placeholder="e.g. Theme 4 Global Business" oninput="ST.inputName=this.value">
      <label for="file-inp" style="display:block;background:#f5f2ed;border:2px dashed #d9d2c8;border-radius:9px;padding:12px 14px;color:#4a3728;font-size:14px;cursor:pointer;text-align:center;margin-bottom:10px">üìé Upload .txt file</label>
      <input id="file-inp" type="file" accept=".txt,.text" style="display:none" onchange="handleFile(event)">
      <div class="divider">or paste below</div>
      <textarea id="upload-ta" placeholder="4.1.2 International Trade&#10;&#10;Define specialisation.&#10;Specialisation is the process of..." oninput="ST.uploadText=this.value">${esc(ST.uploadText)}</textarea>
      <div style="font-size:12px;color:#a39585;margin-top:4px">Supports bullet-point notes, Q:/A: format, or plain paragraph answers.</div>
      ${ST.parseError?`<div class="error">${esc(ST.parseError)}</div>`:""}
      <div class="modal-row">
        <button class="btn-cancel" onclick="ss({modal:null})">Cancel</button>
        <button class="btn-primary" onclick="previewUpload()">Parse & Preview ‚Üí</button>
      </div>
    </div>
  </div>`;
  if(ST.modal==="newSet"&&ST.previewPairs){
    const items=ST.previewPairs.map(p=>`<div class="preview-item">
      <div class="preview-sec">¬ß ${esc(p.section)}</div>
      <div class="preview-q">${esc(p.q)}</div>
      <div class="preview-a">${esc(p.a.slice(0,120))}${p.a.length>120?"‚Ä¶":""}</div>
    </div>`).join("");
    return`<div class="overlay" onclick="if(event.target===this)ss({modal:null})">
      <div class="modal">
        <h2>Preview ‚Äî ${ST.previewPairs.length} questions found</h2>
        <p>Check a few look right, then confirm to save forever.</p>
        <div class="preview-list">${items}</div>
        <div class="modal-row">
          <button class="btn-cancel" onclick="ss({previewPairs:null})">‚Üê Back</button>
          <button class="btn-primary" onclick="confirmUpload()">Confirm & Save ‚úì</button>
        </div>
      </div>
    </div>`;
  }
  return"";
}

loadFromCloud();
</script>
